<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        /* CSS: Controls the styling and visual layout */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #b612c5;
            text-align: center;
        }
        header {
            background-color: #7410ad;
            color: white;
            padding: 2rem;
        }
        main {
            padding: 2rem;
            max-width: 600px;
            margin: auto;
        }
        button {
            background-color: #a72828;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>

    <!-- HTML: Structures the layout and written content -->
    <header>
        <h1>Welcome to My Website</h1>
        <p>Built from scratch with code.</p>
    </header>

    <main>
        <h2>Interactive Section</h2>
        <p>Click the button below to see JavaScript run live in your browser.</p>
        <button id="actionBtn">Click Me!</button>
        <p id="message"></p>

    </main>

    <script>
        // JavaScript: Controls behavioral changes and interactivity
        const button = document.getElementById('actionBtn');
        const message = document.getElementById('message');

        button.addEventListener('click', () => {
            message.textContent = "🎉 noob";
        });
    </script>


</body>
</html>
